name: Gerador App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1 Baixar Codigo
      uses: actions/checkout@v3

    - name: 2 Instalar Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 3 Configurar Pasta Web e Android
      run: |
        # Cria a pasta www que o Capacitor exige e move o index para lá
        mkdir -p www
        cp index.html www/ 2>/dev/null || echo "Ainda sem index na raiz"
        
        npm install
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # Inicializa apontando para a pasta www de verdade
        npx capacitor init "Meu n8n Mobile" "com.meun8n.app" --web-dir=www
        npx capacitor add android

    - name: 4 Compilar APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: 5 Baixar Instalador
      uses: actions/upload-artifact@v4
      with:
        name: meu-n8n-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
